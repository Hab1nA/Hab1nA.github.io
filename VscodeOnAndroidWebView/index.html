<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VSCode Server</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1e1e1e;
      color: #cccccc;
    }

    /* ===== 启动面板 ===== */
    #launch-panel {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e1e1e;
      z-index: 100;
      transition: opacity 0.4s ease;
    }

    #launch-panel.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #launch-panel .logo {
      font-size: 64px;
      margin-bottom: 16px;
    }

    #launch-panel h1 {
      font-size: 22px;
      font-weight: 500;
      color: #e0e0e0;
      margin-bottom: 8px;
      text-align: center;
      padding: 0 16px;
    }

    #launch-panel .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 40px;
      text-align: center;
      padding: 0 16px;
    }

    /* 启动按钮 */
    #btn-launch {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      background: #007acc;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0, 122, 204, 0.4);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #btn-launch:hover {
      background: #0098ff;
    }

    #btn-launch:active {
      transform: scale(0.96);
      box-shadow: 0 2px 10px rgba(0, 122, 204, 0.3);
    }

    #btn-launch .icon {
      font-size: 24px;
    }

    /* 状态提示 */
    #status-text {
      margin-top: 24px;
      font-size: 14px;
      color: #888;
      min-height: 20px;
      text-align: center;
      padding: 0 16px;
    }

    /* 加载动画 */
    .spinner {
      display: none;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #007acc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 16px;
    }

    .spinner.show {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 手动命令 */
    #manual-cmd {
      display: none;
      margin-top: 20px;
      padding: 12px 16px;
      background: #2d2d2d;
      border-radius: 8px;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 12px;
      color: #d4d4d4;
      text-align: left;
      max-width: 90vw;
      word-break: break-all;
      line-height: 1.5;
    }

    #manual-cmd.show {
      display: block;
    }

    /* ===== VSCode iframe 容器 ===== */
    #vscode-container {
      position: fixed;
      inset: 0;
      display: none;
      background: #1e1e1e;
    }

    #vscode-container.show {
      display: block;
    }

    #vscode-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #1e1e1e;
    }

    /* ===== 底部浮动重连按钮 ===== */
    #btn-retry {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #007acc;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <!-- 启动面板 -->
  <div id="launch-panel">
    <div class="logo">🖥️</div>
    <h1>VSCode Server on Android</h1>
    <p class="subtitle">通过 Termux 运行 code-server<br>在浏览器中享受完整的 VSCode 体验</p>

    <a id="btn-launch" href="#" onclick="launchVSCode(event)">
      <span class="icon">🚀</span> 启动 VSCode Server
    </a>

    <div id="status-text"></div>
    <div id="spinner" class="spinner"></div>

    <div id="manual-cmd">
      <div style="color:#888;margin-bottom:6px;">如自动启动失败，请在 Termux 中手动执行：</div>
      <div id="cmd-content"></div>
    </div>
  </div>

  <!-- VSCode iframe -->
  <div id="vscode-container">
    <iframe id="vscode-frame" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>
  </div>

  <!-- 重连按钮 -->
  <button id="btn-retry" onclick="retryConnect()">🔄 重新连接</button>

  <script>
    (function () {
      const TASKER_SCRIPT = "/data/data/com.termux/files/home/.termux/tasker/start-vscode.sh";
      const VSCODE_URL = "http://localhost:8000";
      const RETRY_INTERVAL = 2000;    // 轮询间隔（ms）
      const MAX_RETRIES = 30;         // 最大重试次数（约60秒）
      const INITIAL_DELAY = 3000;     // 触发 intent 后等待几秒再开始轮询

      const launchPanel = document.getElementById("launch-panel");
      const statusText = document.getElementById("status-text");
      const spinner = document.getElementById("spinner");
      const manualCmd = document.getElementById("manual-cmd");
      const cmdContent = document.getElementById("cmd-content");
      const vscodeContainer = document.getElementById("vscode-container");
      const vscodeFrame = document.getElementById("vscode-frame");
      const btnRetry = document.getElementById("btn-retry");
      const btnLaunch = document.getElementById("btn-launch");

      let pollingTimer = null;
      let retryCount = 0;
      let launched = false;

      // 展示手动命令
      cmdContent.textContent =
        "pd sh alpine --isolated \\\n" +
        "  --bind /data/data/com.termux:/termux \\\n" +
        "  --bind ~:/home/termux \\\n" +
        "  --bind /storage/emulated/0:/sdcard \\\n" +
        "  -- code serve-web --host '0.0.0.0' --without-connection-token";

      function setStatus(msg) {
        statusText.textContent = msg;
      }

      function showSpinner(show) {
        spinner.classList.toggle("show", show);
      }

      function showManualCmd(show) {
        manualCmd.classList.toggle("show", show);
      }

      function showVSCode() {
        launchPanel.classList.add("hidden");
        vscodeContainer.classList.add("show");
        vscodeFrame.src = VSCODE_URL;
        btnRetry.style.display = "none";
        stopPolling();
      }

      function showRetryButton() {
        btnRetry.style.display = "block";
      }

      function hideRetryButton() {
        btnRetry.style.display = "none";
      }

      function stopPolling() {
        if (pollingTimer) {
          clearTimeout(pollingTimer);
          pollingTimer = null;
        }
      }

      // 用 Image 探针确认端口可达（fetch no-cors 总返回 opaque，需二次确认）
      function probeVSCode(timeoutMs) {
        return fetch(VSCODE_URL, { mode: "no-cors", cache: "no-store" })
          .then(function () {
            return new Promise(function (resolve) {
              var img = new Image();
              var t = setTimeout(function () {
                img.src = "";
                resolve(true); // 超时也算通了（fetch 已确认端口可达）
              }, timeoutMs || 2000);
              img.onload = function () { clearTimeout(t); resolve(true); };
              img.onerror = function () { clearTimeout(t); resolve(true); }; // 错误也算响应了
              img.src = VSCODE_URL + "/_vscode-remote-resource?" + Date.now();
            });
          })
          .catch(function () {
            // 网络错误说明还没就绪
            return false;
          });
      }

      // 轮询检测 VSCode Server 是否就绪
      function startPolling() {
        stopPolling();
        retryCount = 0;

        function check() {
          retryCount++;
          setStatus("正在等待 VSCode Server 启动... (" + retryCount + "/" + MAX_RETRIES + ")");

          probeVSCode(2000).then(function (ready) {
            if (ready) {
              setStatus("✅ VSCode Server 已就绪！");
              showSpinner(false);
              setTimeout(showVSCode, 500);
              return;
            }

            if (retryCount >= MAX_RETRIES) {
              setStatus("⏱️ 超时：未能连接到 VSCode Server");
              showSpinner(false);
              showManualCmd(true);
              showRetryButton();
              launched = false; // 允许用户直接重试，无需刷新页面
              return;
            }

            pollingTimer = setTimeout(check, RETRY_INTERVAL);
          });
        }

        pollingTimer = setTimeout(check, INITIAL_DELAY);
      }

      // 构建 Android Intent URI 触发 Termux:Tasker
      function buildTaskerIntent() {
        // Termux:Tasker 的 intent 格式
        // action: com.termux.tasker.RUN_COMMAND
        // extras: com.termux.tasker.RUN_COMMAND_PATH = 脚本路径
        var scriptPath = encodeURIComponent(TASKER_SCRIPT);
        return (
          "intent://#Intent;" +
          "action=com.termux.tasker.RUN_COMMAND;" +
          "S.com.termux.tasker.RUN_COMMAND_PATH=" + scriptPath + ";" +
          "B.com.termux.tasker.RUN_COMMAND_BACKGROUND=true;" +
          "package=com.termux.tasker;" +
          "end"
        );
      }

      // 点击启动按钮
      window.launchVSCode = function (event) {
        if (event) event.preventDefault();
        if (launched) return;
        launched = true;

        setStatus("正在调用 Termux:Tasker...");
        showSpinner(true);
        showManualCmd(false);
        hideRetryButton();

        // 尝试通过 intent 触发 Termux:Tasker
        var intentUrl = buildTaskerIntent();

        // 通过隐藏的 <a> 标签触发 intent URI（Android Chrome 不允许在 iframe 内触发 intent）
        var intentLink = document.createElement("a");
        intentLink.style.display = "none";
        intentLink.href = intentUrl;
        document.body.appendChild(intentLink);
        intentLink.click();
        setTimeout(function () {
          document.body.removeChild(intentLink);
        }, 500);

        // 等待一小段时间让 Termux:Tasker 有机会启动，然后开始轮询
        startPolling();

        // 如果15秒后还没连上，显示手动命令作为备选
        setTimeout(function () {
          if (!vscodeContainer.classList.contains("show")) {
            showManualCmd(true);
          }
        }, 15000);
      };

      // 重连按钮
      window.retryConnect = function () {
        launched = false;
        stopPolling();
        setStatus("");
        showSpinner(false);
        showManualCmd(false);
        hideRetryButton();
        launchPanel.classList.remove("hidden");
        vscodeContainer.classList.remove("show");
        vscodeFrame.src = "about:blank";
        btnLaunch.focus();
      };

      // 如果 VSCode 已经运行，直接检测
      // （用户可能已经手动启动了 code-server）
      window.addEventListener("DOMContentLoaded", function () {
        probeVSCode(1500).then(function (ready) {
          if (ready) {
            setStatus("检测到已运行的 VSCode Server，直接连接...");
            showSpinner(true);
            setTimeout(showVSCode, 800);
          }
          // 未运行，等待用户点击按钮
        });
      });
    })();
  </script>
</body>
</html>
