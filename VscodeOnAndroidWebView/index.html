<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VSCode Server</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1e1e1e;
      color: #cccccc;
    }

    /* ===== 启动面板 ===== */
    #launch-panel {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e1e1e;
      z-index: 100;
      transition: opacity 0.4s ease;
    }

    #launch-panel.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #launch-panel .logo {
      font-size: 64px;
      margin-bottom: 16px;
    }

    #launch-panel h1 {
      font-size: 22px;
      font-weight: 500;
      color: #e0e0e0;
      margin-bottom: 8px;
      text-align: center;
      padding: 0 16px;
    }

    #launch-panel .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 40px;
      text-align: center;
      padding: 0 16px;
    }

    /* 启动按钮 */
    #btn-launch {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      background: #007acc;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0, 122, 204, 0.4);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #btn-launch:hover {
      background: #0098ff;
    }

    #btn-launch:active {
      transform: scale(0.96);
      box-shadow: 0 2px 10px rgba(0, 122, 204, 0.3);
    }

    #btn-launch .icon {
      font-size: 24px;
    }

    /* 状态提示 */
    #status-text {
      margin-top: 24px;
      font-size: 14px;
      color: #888;
      min-height: 20px;
      text-align: center;
      padding: 0 16px;
    }

    /* 加载动画 */
    .spinner {
      display: none;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #007acc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 16px;
    }

    .spinner.show {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 提示框 */
    #hint-box {
      display: none;
      margin-top: 20px;
      padding: 12px 16px;
      background: #2d2d2d;
      border-left: 3px solid #e5a00d;
      border-radius: 4px;
      font-size: 13px;
      color: #cccccc;
      text-align: left;
      max-width: 90vw;
      line-height: 1.6;
    }

    #hint-box.show {
      display: block;
    }

    /* ===== VSCode iframe 容器 ===== */
    #vscode-container {
      position: fixed;
      inset: 0;
      display: none;
      background: #1e1e1e;
    }

    #vscode-container.show {
      display: block;
    }

    #vscode-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #1e1e1e;
    }

    /* ===== 底部浮动重连按钮 ===== */
    #btn-retry {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #007acc;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <!-- 启动面板 -->
  <div id="launch-panel">
    <div class="logo">🖥️</div>
    <h1>VSCode Server on Android</h1>
    <p class="subtitle">通过 Termux 运行 code-server<br>在浏览器中享受完整的 VSCode 体验</p>

    <a id="btn-launch" href="#" onclick="launchVSCode(event)">
      <span class="icon">🚀</span> 启动 VSCode Server
    </a>

    <div id="status-text"></div>
    <div id="spinner" class="spinner"></div>

    <div id="hint-box"></div>
  </div>

  <!-- VSCode iframe -->
  <div id="vscode-container">
    <iframe id="vscode-frame" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>
  </div>

  <!-- 重连按钮 -->
  <button id="btn-retry" onclick="retryConnect()">🔄 重新连接</button>

  <script>
    (function () {
      const BRIDGE_URL   = "http://localhost:9000";
      const VSCODE_URL   = "http://localhost:8000";
      const POLL_INTERVAL = 2000;
      const MAX_RETRIES  = 30;
      const INITIAL_DELAY = 3000;

      const launchPanel     = document.getElementById("launch-panel");
      const statusText      = document.getElementById("status-text");
      const spinner         = document.getElementById("spinner");
      const hintBox         = document.getElementById("hint-box");
      const vscodeContainer = document.getElementById("vscode-container");
      const vscodeFrame     = document.getElementById("vscode-frame");
      const btnRetry        = document.getElementById("btn-retry");
      const btnLaunch       = document.getElementById("btn-launch");

      let pollingTimer = null;
      let retryCount   = 0;
      let launched     = false;
      let bridgeReady   = false;

      function setStatus(msg) {
        statusText.textContent = msg;
      }

      function showSpinner(s) {
        spinner.classList.toggle("show", s);
      }

      function showHint(msg) {
        hintBox.innerHTML = msg;
        hintBox.classList.add("show");
      }

      function hideHint() {
        hintBox.classList.remove("show");
      }

      function showVSCode() {
        launchPanel.classList.add("hidden");
        vscodeContainer.classList.add("show");
        vscodeFrame.src = VSCODE_URL;
        btnRetry.style.display = "none";
        stopPolling();
      }

      function stopPolling() {
        if (pollingTimer) {
          clearTimeout(pollingTimer);
          pollingTimer = null;
        }
      }

      // ---------- 探测桥接服务 ----------
      function probeBridge() {
        return fetch(BRIDGE_URL + "/ping", { mode: "cors", cache: "no-store", signal: AbortSignal.timeout(2000) })
          .then(function (r) { return r.ok; })
          .catch(function () { return false; });
      }

      // ---------- 探测 VSCode Server ----------
      function probeVSCode() {
        return fetch(VSCODE_URL, { mode: "no-cors", cache: "no-store" })
          .then(function () { return true; })
          .catch(function () { return false; });
      }

      // ---------- 轮询等待 VSCode 就绪 ----------
      function startPolling() {
        stopPolling();
        retryCount = 0;

        function check() {
          retryCount++;
          setStatus("正在等待 VSCode Server 启动... (" + retryCount + "/" + MAX_RETRIES + ")");

          probeVSCode().then(function (ready) {
            if (ready) {
              setStatus("✅ VSCode Server 已就绪！");
              showSpinner(false);
              setTimeout(showVSCode, 500);
              return;
            }

            if (retryCount >= MAX_RETRIES) {
              setStatus("⏱️ 超时：未能连接到 VSCode Server");
              showSpinner(false);
              showHint(
                "❌ 连接超时<br><br>" +
                "请在 Termux 中手动执行：<br>" +
                "<code style='font-size:11px;word-break:break-all;'>bash ~/.termux/tasker/start-vscode.sh</code><br><br>" +
                "执行完成后刷新此页面。"
              );
              launched = false;
              return;
            }

            pollingTimer = setTimeout(check, POLL_INTERVAL);
          });
        }

        pollingTimer = setTimeout(check, INITIAL_DELAY);
      }

      // ---------- 通过桥接服务启动 VSCode ----------
      function triggerBridgeStart() {
        return fetch(BRIDGE_URL + "/start", { mode: "cors", cache: "no-store", signal: AbortSignal.timeout(5000) })
          .then(function (r) {
            return r.ok;
          })
          .catch(function () {
            return false;
          });
      }

      // ---------- 点击启动按钮 ----------
      window.launchVSCode = function (event) {
        if (event) event.preventDefault();
        if (launched) return;
        launched = true;

        setStatus("正在通过桥接服务启动 VSCode Server...");
        showSpinner(true);
        hideHint();

        if (!bridgeReady) {
          setStatus("⚠️ 桥接服务未连接，尝试中...");
        }

        triggerBridgeStart().then(function (ok) {
          if (ok) {
            setStatus("桥接服务已收到请求，等待 code-server 启动...");
          } else {
            setStatus("⚠️ 桥接服务通信失败，但仍将检测 code-server...");
            showHint(
              "⚠️ 无法连接到桥接服务 (localhost:9000)<br><br>" +
              "请确认已在 Termux 中启动了桥接服务：<br>" +
              "<code style='font-size:11px;'>bash ~/.termux/tasker/bridge-server.sh</code><br><br>" +
              "或直接手动启动 code-server：<br>" +
              "<code style='font-size:11px;word-break:break-all;'>pd sh alpine --isolated --bind /data/data/com.termux:/termux --bind ~:/home/termux --bind /storage/emulated/0:/sdcard -- code serve-web --host '0.0.0.0' --without-connection-token</code>"
            );
          }
          startPolling();
        });
      };

      // ---------- 重连按钮 ----------
      window.retryConnect = function () {
        launched = false;
        stopPolling();
        setStatus("");
        showSpinner(false);
        hideHint();
        launchPanel.classList.remove("hidden");
        vscodeContainer.classList.remove("show");
        vscodeFrame.src = "about:blank";
        btnLaunch.focus();
      };

      // ---------- 页面初始化 ----------
      function init() {
        // 1. 先检测桥接服务是否在线
        probeBridge().then(function (ok) {
          bridgeReady = ok;
          if (ok) {
            setStatus("✅ 桥接服务已连接，可以启动 VSCode");
          } else {
            setStatus("🔌 桥接服务未连接");
            showHint(
              "📋 首次使用请先在 Termux 中执行：<br>" +
              "<code style='font-size:11px;'>bash ~/.termux/tasker/bridge-server.sh</code><br><br>" +
              "建议设为开机自启：<br>" +
              "<code style='font-size:11px;'>echo 'bash ~/.termux/tasker/bridge-server.sh &' >> ~/.bashrc</code><br><br>" +
              "启动桥接服务后，刷新此页面即可。"
            );
          }
        });

        // 2. 检测 code-server 是否已在运行（用户可能手动启动了）
        probeVSCode().then(function (ready) {
          if (ready) {
            setStatus("检测到已运行的 VSCode Server，直接连接...");
            showSpinner(true);
            setTimeout(showVSCode, 800);
          }
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
